{% load djicons i18n %}
<div data-back-url="{% url 'gdpr:consent_records_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Consentrecord" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'gdpr:consent_records_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-consent_record-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-consent_record-form"
          hx-post="{% url 'gdpr:consent_record_edit' obj.id %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Subject Name" %}</label>
                <input type="text" name="subject_name" class="input input-sm w-full" value="{{ obj.subject_name }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Subject Email" %}</label>
                <input type="email" name="subject_email" class="input input-sm w-full" value="{{ obj.subject_email }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Purpose" %}</label>
                <input type="text" name="purpose" class="input input-sm w-full" value="{{ obj.purpose }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Consented" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="consented" {% if obj.consented %}checked{% endif %}>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Consent Date" %}</label>
                <input type="datetime-local" name="consent_date" class="input input-sm w-full" value="{{ obj.consent_date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Withdrawal Date" %}</label>
                <input type="datetime-local" name="withdrawal_date" class="input input-sm w-full" value="{{ obj.withdrawal_date }}">
                </div>
            </div>
        </div>
    </form>
</div>
